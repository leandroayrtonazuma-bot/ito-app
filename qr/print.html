<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ito 参加用QR（印刷・掲示用）</title>
  <style>
    :root { --ink: #0F172A; --accent: #2563EB; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      color: var(--ink);
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      border: 4px solid var(--ink);
      border-radius: 28px;
      padding: 40px 36px;
      text-align: center;
      max-width: 560px;
      width: 100%;
    }
    h1 { font-size: 40px; letter-spacing: 2px; margin-bottom: 6px; }
    .sub { color: #475569; font-size: 16px; margin-bottom: 24px; }
    .qr { width: 100%; max-width: 420px; height: auto; }
    .steps {
      margin-top: 24px;
      font-size: 20px;
      font-weight: 700;
      color: #1e293b;
      line-height: 1.7;
    }
    .steps span { color: var(--accent); }
    .url { margin-top: 16px; font-size: 13px; color: #64748b; word-break: break-all; }
    @media print { .card { border-color: #000; } }
  </style>
</head>
<body>
  <div class="card">
    <h1>ito 参加用QR</h1>
    <p class="sub">この1枚を会場に掲示すれば全員参加できます</p>
    <img class="qr" src="join.png" alt="ito 参加用QR" />
    <p class="steps">
      QRを読み取る<br />
      → <span>部屋を選ぶ</span>（A〜E）<br />
      → 名前を入力 → 「参加する」
    </p>
    <p class="url">https://leandroayrtonazuma-bot.github.io/ito-app/</p>
  </div>
</body>
</html>
