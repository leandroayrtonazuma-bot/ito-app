<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0F172A" />
  <title>ito｜あなたの数字</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="screen">
    <div class="card fade-in">
      <!-- 上部: ルームと名前 -->
      <div class="player-header">
        <span class="room-badge room-badge--sm" id="roomLabel"></span>
        <span id="playerName" class="player-name"></span>
      </div>

      <!-- お題 -->
      <section class="topic-block">
        <p class="section-caption">お題</p>
        <p id="topic" class="topic-text">…</p>
      </section>

      <div class="divider"></div>

      <!-- あなたの数字 -->
      <section class="number-block">
        <p class="section-caption">あなたの数字</p>

        <!-- 数字表示エリア -->
        <div id="numberArea" class="number-area">
          <span id="numberValue" class="number-value">--</span>
        </div>

        <!-- 数字がまだ配られていないときの案内 -->
        <p id="waitingMsg" class="waiting-msg">
          運営が数字を配るまで、少しお待ちください…
        </p>

        <!-- 表示/非表示 切替ボタン（数字がある時だけ表示） -->
        <button id="toggleButton" class="btn btn--primary btn--block" type="button" hidden>
          数字を隠す
        </button>
        <p id="peekHint" class="hint" hidden>
          周りに見られないように確認してね
        </p>
      </section>

      <div class="divider"></div>

      <!-- 同じ部屋のメンバー（名前のみ。数字は表示しない） -->
      <section class="members-block">
        <p class="section-caption">同じ部屋のメンバー</p>
        <ul id="memberList" class="member-list">
          <li class="member-list__empty">…</li>
        </ul>
      </section>

      <div class="divider"></div>

      <!-- 管理者専用ツール（管理者が「参加者として参加」した端末だけに表示） -->
      <section id="adminControls" class="admin-controls" hidden>
        <p class="section-caption">管理者ツール</p>

        <button id="adminRerollBtn" class="btn btn--accent btn--block" type="button">
          自分の数字を引き直す
        </button>

        <div class="field">
          <label class="field__label">お題を変更</label>
          <div class="field__row">
            <input id="adminTopicInput" class="mini-input" type="text"
                   placeholder="お題を入力（空欄も可）" maxlength="40" />
            <button id="adminTopicSetBtn" class="btn btn--mini btn--primary" type="button">設定</button>
          </div>
          <button id="adminTopicRandomBtn" class="btn btn--mini btn--ghost btn--block" type="button">
            おまかせ（ランダム）
          </button>
        </div>
      </section>

      <div class="divider"></div>

      <!-- 退出（この端末を空にして、別の人として参加し直す） -->
      <button id="leaveButton" class="btn btn--ghost btn--block" type="button">
        退出する（別の人として参加）
      </button>
      <p class="hint">この端末の参加情報を消して部屋選択に戻ります</p>
    </div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/player.js"></script>
</body>
</html>
