<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0F172A" />
  <title>ito｜管理画面</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="screen screen--admin">
    <header class="admin-header fade-in">
      <h1 class="admin-title">ito 管理画面</h1>
      <p class="admin-subtitle">各ルームの進行はカードのボタンだけでOK</p>
    </header>

    <!-- 全ルーム一括操作 -->
    <div class="admin-actions fade-in">
      <button id="distributeAll" class="btn btn--primary btn--block" type="button">
        全部屋いっぺんに数字を配布
      </button>
      <p class="hint">参加者がいる全部屋に、まとめて数字を配ります（お題はそのまま・空の部屋はスキップ）</p>

      <button id="setTopicAll" class="btn btn--accent btn--block" type="button">
        全部屋のお題を一括で決める
      </button>
      <p class="hint">お題を1つランダムに選び、全部屋に同じお題を設定します（数字の配布はしません）</p>

      <button id="clearTopicAll" class="btn btn--ghost btn--block" type="button">
        全部屋のお題をなしにする
      </button>
      <p class="hint">全部屋のお題を一括で「お題なし」にします（数字の配布はしません）</p>
    </div>

    <!-- ルームカードの一覧（js/admin.js が生成） -->
    <div id="roomList" class="room-list"></div>

    <footer class="admin-footer">
      <p class="hint">
        参加用URLは <code>index.html?room=A</code> のように <code>?room=</code> を付けます。
        各カードの「参加用リンクをコピー」からQRを作成してください。
      </p>
    </footer>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
