<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0F172A" />
  <title>ito｜管理画面</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="screen screen--admin">
    <header class="admin-header fade-in">
      <h1 class="admin-title">ito 管理画面</h1>
      <p class="admin-subtitle">各ルームの進行はカードのボタンだけでOK</p>
    </header>

    <!-- ルームカードの一覧（js/admin.js が生成） -->
    <div id="roomList" class="room-list"></div>

    <footer class="admin-footer">
      <p class="hint">
        参加用URLは <code>index.html?room=A</code> のように <code>?room=</code> を付けます。
        各カードの「参加用リンクをコピー」からQRを作成してください。
      </p>
    </footer>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
