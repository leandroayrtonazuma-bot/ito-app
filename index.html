<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <!-- スマホ最適化: 幅を端末に合わせ、ユーザー拡大は許可 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0F172A" />
  <title>ito｜参加する</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="screen">
    <div class="card card--center fade-in">
      <!-- アプリタイトル -->
      <h1 class="app-title">ito</h1>
      <p class="app-subtitle">数字は他の人に見せずに、お題で協力しよう</p>

      <!-- ステップ1: 部屋を選ぶ（QRから来た直後はこれが表示される） -->
      <section id="roomSelect" hidden>
        <p class="select-caption">入る部屋を選んでください</p>
        <div id="roomGrid" class="room-grid"><!-- 部屋ボタンはJSで生成 --></div>
        <p class="hint">人数は自動で更新されます</p>
      </section>

      <!-- ステップ2: 名前を入れて参加 -->
      <div id="joinStep" hidden>
        <div id="roomBadge" class="room-badge">
          <span id="roomLabel"></span>
        </div>

        <form id="joinForm" class="form">
          <label class="field-label" for="nameInput">なまえ</label>
          <input
            id="nameInput"
            class="text-input"
            type="text"
            inputmode="text"
            autocomplete="name"
            maxlength="20"
            placeholder="例：たろう"
            required
          />
          <button id="joinButton" class="btn btn--primary btn--block" type="submit">
            参加する
          </button>
          <button id="backButton" class="btn btn--ghost btn--block" type="button">
            ← 部屋を選び直す
          </button>
          <p class="hint">名前を入れて「参加する」を押すだけ！</p>
        </form>
      </div>
    </div>
  </main>

  <!-- トースト（一時メッセージ） -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/index.js"></script>
</body>
</html>
